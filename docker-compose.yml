name: chatbot-ia-pedagogique

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
    networks:
      - chatbot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=pedagogique-secret-key-2024
      - DEFAULT_USER_ROLE=user
      - ENABLE_SIGNUP=true
      - DEFAULT_MODELS=gpt-oss
      - DEFAULT_MODEL=gpt-oss
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=duckduckgo
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - chatbot_network

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=pedagogique123
      - N8N_ENCRYPTION_KEY=pedagogique-encryption-key-2024
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Paris
      - TZ=Europe/Paris
      - N8N_DEFAULT_LOCALE=fr
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - chatbot_network

volumes:
  ollama_data:
    driver: local
  openwebui_data:
    driver: local
  n8n_data:
    driver: local

networks:
  chatbot_network:
    driver: bridge
    name: chatbot_network